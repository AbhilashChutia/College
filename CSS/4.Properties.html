<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>A Simple Css Example</title>
        <style>
            body {
                background: black;
            }
            DIV.PAGE {
                background: #ffd040;
                color: black;
                margin: 50px 10px 50px 10px;
                width: 99%;
                height: 100%;
            }
            h1 {
                font-size: 24pt;
                font-family: "Courier New", Courier, monospace;
                text-align: center;
            }
            .black {
                color: black;
                background: white;
            }
            .white {
                color: white;
                background: black;
            }
            p {
                font-family: Arial, Helvetica, sans-serif;
                font-size: 16pt;
                line-height: 200%;
                text-align: justify;
                text-indent: 20pt;
            }
            .style {
                color: blue;
                font-family: Arial, Helvetica, sans-serif;
                font-style: oblique;
            }
            .size {
                font-size: x-large;
            }
            #letterspace {
                letter-spacing: 15px;
            }
        </style>
    </head>
    <body>
        <div class="PAGE">
            <h1>
                <span class="black">CSS</span>
                <span class="white">FUN</span>
            </h1>
            <hr />
            <p>
                With stylesheet, you will be able to control presentation of web
                pages with greater precision. Stylesheets can be used to set
                everything from <span class="style">font styles</span> and
                <span class="size">size</span> to
                <span id="letterspace">letterspacing</span> and the heights.
            </p>
        </div>
    </body>
</html>
